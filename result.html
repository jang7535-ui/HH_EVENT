<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>헥토헬스케어 이벤트 추첨 | 결과 확인</title>
<style>
:root{--bg:#0f1117;--panel:#171a23;--text:#f8fafc;--muted:#9aa3b2;--orange:#ff5a00;--line:#303749;--green:#22c55e;--red:#ef4444}*{box-sizing:border-box}body{margin:0;font-family:Malgun Gothic,Apple SD Gothic Neo,Segoe UI,sans-serif;background:radial-gradient(circle at top,#252b3a,#0f1117 45%,#090a0f);color:var(--text);min-height:100vh}.wrap{max-width:880px;margin:0 auto;padding:28px 18px 64px}.brand{display:flex;gap:12px;align-items:center;margin-bottom:18px}.logo{width:44px;height:44px;border-radius:13px;background:linear-gradient(135deg,var(--orange),#ffb36b);box-shadow:0 0 26px rgba(255,90,0,.38)}h1{font-size:28px;margin:0 0 6px}.desc{margin:0;color:var(--muted);font-size:14px;line-height:1.6}.card{background:rgba(23,26,35,.94);border:1px solid var(--line);border-radius:22px;padding:18px;box-shadow:0 20px 60px rgba(0,0,0,.28);margin-bottom:18px}.label{display:block;margin:14px 0 7px;color:#d1d5db;font-weight:800;font-size:13px}input{width:100%;border:1px solid #3a4254;background:#0c0f16;color:var(--text);border-radius:14px;padding:13px;font-size:16px;outline:none}.row{display:flex;gap:10px}.row>*{flex:1}.btn{border:0;border-radius:14px;padding:13px 15px;background:linear-gradient(135deg,var(--orange),#ff7b22);color:#fff;font-weight:900;cursor:pointer;white-space:nowrap}.notice{padding:12px 14px;border:1px solid #374151;background:#111827;border-radius:14px;color:#cbd5e1;font-size:13px;line-height:1.5}.participants{display:grid;grid-template-columns:repeat(auto-fill,minmax(86px,1fr));gap:9px;max-height:250px;overflow:auto;padding:4px}.chip{min-height:40px;display:flex;align-items:center;justify-content:center;text-align:center;padding:7px;border-radius:999px;background:#202636;border:1px solid #333b4e;color:#e5e7eb;font-weight:900;font-size:12px}.resultBox{border-radius:24px;border:1px solid #343b4e;background:linear-gradient(180deg,#1b2230,#11151f);padding:30px 18px;text-align:center;min-height:180px;display:flex;flex-direction:column;align-items:center;justify-content:center}.resultLabel{font-size:13px;color:var(--muted);font-weight:900;letter-spacing:.12em}.status{font-size:56px;line-height:1.1;font-weight:1000;margin:10px 0}.status.win{color:#bbf7d0;text-shadow:0 0 28px rgba(34,197,94,.45)}.status.lose{color:#fecaca;text-shadow:0 0 28px rgba(239,68,68,.38)}.message{font-size:18px;line-height:1.55;color:#f8fafc;font-weight:800}.checking{border-color:rgba(255,90,0,.65);box-shadow:0 0 32px rgba(255,90,0,.18) inset,0 0 26px rgba(255,90,0,.16)}.confetti{position:fixed;inset:0;pointer-events:none;overflow:hidden}.confetti i{position:absolute;width:8px;height:14px;background:var(--orange);opacity:.9;animation:fall 1.7s linear forwards}@keyframes fall{to{transform:translateY(100vh) rotate(680deg);opacity:0}}@media(max-width:640px){.wrap{padding:16px 12px 36px}.row{flex-direction:column}.btn{width:100%;font-size:16px}.card{border-radius:18px;padding:15px}h1{font-size:22px}.participants{grid-template-columns:repeat(auto-fill,minmax(70px,1fr));max-height:220px}.status{font-size:42px}}
</style>
</head>
<body>
<div class="wrap">
  <div class="brand"><div class="logo"></div><div><h1 id="title">헥토헬스케어 이벤트 추첨</h1><p class="desc">본인 이름을 입력하면 당첨 여부를 확인할 수 있습니다.</p></div></div>
  <div class="card">
    <label class="label">이름</label>
    <div class="row"><input id="name" placeholder="예: 김민준" onkeydown="if(event.key==='Enter')check()"><button class="btn" onclick="check()">결과확인</button></div>
    <div class="notice" style="margin-top:12px">참여자 명단에 있는 이름과 동일하게 입력해주세요.</div>
  </div>
  <div class="card">
    <h2 style="font-size:18px;margin:0 0 12px">참여자 명단</h2>
    <div class="participants" id="list"></div>
  </div>
  <div class="card">
    <div class="resultBox" id="result"><div class="resultLabel">RESULT</div><div class="status">대기</div><div class="message">결과확인을 누르면 당첨/미당첨이 번갈아 표시된 뒤 최종 결과가 나옵니다.</div></div>
  </div>
</div><div class="confetti" id="confetti"></div>
<script>
const $=id=>document.getElementById(id);let D=null;
function dec(str){try{str=str.replace(/-/g,'+').replace(/_/g,'/');while(str.length%4)str+='=';return JSON.parse(decodeURIComponent(escape(atob(str))))}catch(e){return null}}
function html(s){return String(s).replace(/[&<>"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]));}
function boot(){const p=new URLSearchParams(location.search);D=dec(p.get('d')||'');if(!D||!Array.isArray(D.names)){setResult('확인불가','결과 데이터가 없습니다. 관리자에게 새 결과 링크를 요청해주세요.',false);return}$('title').textContent=D.title||'헥토헬스케어 이벤트 추첨';$('list').innerHTML=D.names.map(n=>'<div class="chip">'+html(n)+'</div>').join('');}
function setResult(status,msg,isWin){const box=$('result');box.classList.remove('checking');box.innerHTML='<div class="resultLabel">RESULT</div><div class="status '+(isWin?'win':'lose')+'">'+html(status)+'</div><div class="message">'+html(msg)+'</div>';}
function toggle(finalWin,done){const box=$('result');box.classList.add('checking');let i=0,total=18;function r(){const w=i%2===0;box.innerHTML='<div class="resultLabel">CHECKING</div><div class="status '+(w?'win':'lose')+'">'+(w?'당첨':'미당첨')+'</div><div class="message">결과를 확인하고 있습니다.</div>';i++;if(i<=total)setTimeout(r,90+i*12);else{box.classList.remove('checking');done();}}r();}
function check(){if(!D)return;const n=$('name').value.trim();if(!n){alert('이름을 입력해주세요.');return}if(!D.names.includes(n)){setResult('확인불가','참여자 명단에 없는 이름입니다.',false);return}if(!D.winner){setResult('확인불가','아직 당첨자가 확정되지 않았습니다.',false);return}const win=n===D.winner;toggle(win,()=>{setResult(win?'당첨':'미당첨',win?(D.winMsg||'축하합니다! 당첨되었습니다.'):(D.loseMsg||'아쉽지만 이번 추첨에서는 미당첨입니다.'),win);if(win)confetti();});}
function confetti(){const box=$('confetti');box.innerHTML='';for(let i=0;i<90;i++){const p=document.createElement('i');p.style.left=Math.random()*100+'%';p.style.top=(-30-Math.random()*160)+'px';p.style.background=['#ff5a00','#facc15','#22c55e','#60a5fa','#f472b6'][Math.floor(Math.random()*5)];p.style.animationDelay=(Math.random()*.45)+'s';box.appendChild(p)}setTimeout(()=>box.innerHTML='',2200)}
boot();
</script>
</body>
</html>
