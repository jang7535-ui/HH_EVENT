<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>헥토헬스케어 이벤트 추첨 | 결과 확인</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body class="result-body">
  <main class="wrap narrow">
    <header class="hero center">
      <div class="brandmark">H</div>
      <div>
        <p class="eyebrow">RESULT PAGE</p>
        <h1 id="eventTitle">헥토헬스케어 이벤트 추첨</h1>
        <p class="desc">본인 이름을 입력한 뒤 결과를 확인하세요.</p>
      </div>
    </header>

    <section class="card check-card">
      <label>이름</label>
      <div class="link-row">
        <input id="checkName" placeholder="예: 김민준" autocomplete="name" />
        <button class="btn primary" id="checkBtn">결과 확인</button>
      </div>
      <p class="hint">결과 페이지에서는 참여자 전체 명단을 표시하지 않습니다.</p>
    </section>

    <section class="card final-card">
      <div class="status-box" id="statusBox">
        <span class="label-small">RESULT</span>
        <strong>이름 입력</strong>
        <p>결과 확인 버튼을 누르면 당첨 여부가 표시됩니다.</p>
      </div>
    </section>
  </main>

  <script src="./result.js"></script>
</body>
</html>
