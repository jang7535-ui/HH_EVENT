<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>헥토헬스케어 이벤트 추첨 결과</title><link rel="stylesheet" href="style.css"></head><body>
<div class="wrap"><header class="header"><div class="brand"><div class="logo"></div><div><h1 id="pageTitle">헥토헬스케어 이벤트 추첨</h1><p class="desc">본인 이름을 입력하면 당첨 여부를 확인할 수 있습니다. 참여자 명단은 아래 결과창에 함께 표시됩니다.</p></div></div><span class="pill">RESULT</span></header>
<main class="publicBox"><section class="card"><h2>결과 확인</h2><label class="label">이름</label><div class="row"><input id="checkName" placeholder="예: 김민준" autocomplete="name" onkeydown="if(event.key==='Enter')check()"><button class="btn primary" onclick="check()">결과확인</button></div><div class="notice" style="margin-top:12px">관리자 페이지로 이동할 수 없습니다.</div></section>
<section class="card" style="margin-top:18px"><div class="stage"><div class="titleLine"><div><div class="drawTitle" id="stageTitle">결과 확인</div><div class="drawSub">참여자 결과 화면</div></div><span class="pill">CHECK</span></div><div class="participantListTitle">참여자 명단</div><div id="chips" class="participants"></div><div id="result" class="resultBox"><div class="resultLabel">RESULT</div><div class="winnerName">이름 입력</div><div class="message">결과확인을 누르면 당첨/미당첨 애니메이션 후 결과가 표시됩니다.</div></div><div id="confetti" class="confetti"></div></div></section></main><div class="footer">헥토헬스케어 이벤트 추첨</div></div><script src="result.js"></script></body></html>
