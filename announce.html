<!doctype html>
<html lang="ko">
<head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>당첨자 발표</title><style>
:root{--orange:#ff5a00;--text:#f8fafc;--muted:#9aa3b2}*{box-sizing:border-box}body{margin:0;font-family:Malgun Gothic,Apple SD Gothic Neo,Segoe UI,sans-serif;background:radial-gradient(circle at top,#2b3140,#0f1117 48%,#090a0f);color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:18px}.poster{width:min(100%,980px);min-height:560px;border:1px solid #303749;border-radius:34px;background:linear-gradient(180deg,rgba(23,26,35,.96),rgba(12,15,22,.96));box-shadow:0 30px 90px rgba(0,0,0,.45);padding:54px 32px;text-align:center;position:relative;overflow:hidden}.poster:before{content:"";position:absolute;width:420px;height:420px;border-radius:50%;right:-180px;top:-180px;background:rgba(255,90,0,.18)}.logo{width:82px;height:82px;border-radius:24px;background:linear-gradient(135deg,var(--orange),#ffb36b);box-shadow:0 0 34px rgba(255,90,0,.38);margin:0 auto 22px}.label{color:var(--muted);font-weight:900;letter-spacing:.16em}.title{font-size:44px;font-weight:1000;margin:10px 0 26px}.winner{display:inline-flex;align-items:center;justify-content:center;min-width:min(680px,90%);min-height:160px;border-radius:44px;background:linear-gradient(135deg,#22c55e,#86efac);color:#052e16;font-size:76px;font-weight:1000;box-shadow:0 0 60px rgba(34,197,94,.35);animation:pop 1.4s ease-in-out infinite alternate}.msg{font-size:28px;font-weight:900;color:#bbf7d0;margin:30px 0 0}.foot{color:#6b7280;margin-top:36px;font-weight:700}@keyframes pop{from{transform:scale(1)}to{transform:scale(1.035)}}.confetti{position:fixed;inset:0;pointer-events:none;overflow:hidden}.confetti i{position:absolute;width:8px;height:14px;background:var(--orange);opacity:.9;animation:fall 2.3s linear infinite}@keyframes fall{to{transform:translateY(105vh) rotate(680deg);opacity:0}}@media(max-width:640px){.poster{min-height:500px;padding:38px 18px;border-radius:24px}.title{font-size:28px}.winner{font-size:44px;min-height:120px;border-radius:32px}.msg{font-size:20px}.logo{width:64px;height:64px}}
</style></head><body><main class="poster"><div class="logo"></div><div class="label">WINNER ANNOUNCEMENT</div><div class="title" id="title">헥토헬스케어 이벤트 추첨</div><div class="winner" id="winner">당첨자</div><div class="msg" id="msg">축하합니다! 당첨되었습니다.</div><div class="foot">Hecto Healthcare Event</div></main><div class="confetti" id="confetti"></div><script>
function dec(str){try{str=str.replace(/-/g,'+').replace(/_/g,'/');while(str.length%4)str+='=';return JSON.parse(decodeURIComponent(escape(atob(str))))}catch(e){return null}}function html(s){return String(s).replace(/[&<>"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]));}const D=dec(new URLSearchParams(location.search).get('d')||'');if(D){title.textContent=D.title||'헥토헬스케어 이벤트 추첨';winner.textContent=D.winner||'당첨자';msg.textContent=D.winMsg||'축하합니다! 당첨되었습니다.'}else{winner.textContent='확인불가';msg.textContent='결과 데이터가 없습니다.'}const box=confetti;for(let i=0;i<120;i++){const p=document.createElement('i');p.style.left=Math.random()*100+'%';p.style.top=(-30-Math.random()*800)+'px';p.style.background=['#ff5a00','#facc15','#22c55e','#60a5fa','#f472b6'][Math.floor(Math.random()*5)];p.style.animationDelay=(Math.random()*2.2)+'s';box.appendChild(p)}
</script></body></html>
