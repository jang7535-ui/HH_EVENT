<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>헥토헬스케어 이벤트 추첨 | 관리자</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <main class="wrap">
    <header class="hero">
      <div class="brandmark">H</div>
      <div>
        <p class="eyebrow">ADMIN v2</p>
        <h1>헥토헬스케어 이벤트 추첨</h1>
        <p class="desc">관리자 전용 · 참여자 등록, 추첨 실행, 결과 링크 생성</p>
      </div>
    </header>

    <section class="grid admin-grid">
      <div class="card control-card">
        <h2>관리자 설정</h2>
        <label>관리자 PIN</label>
        <input id="pin" type="password" value="hhc2026" />
        <p class="hint">기본 PIN: <b>hhc2026</b></p>

        <label>추첨명</label>
        <input id="eventTitle" value="헥토헬스케어 이벤트 추첨" />

        <label>참여자 명단</label>
        <textarea id="names" placeholder="김민준, 이서연 또는 줄바꿈으로 입력">김민준
이서연
박지훈
최유진
정현우
강민지
조성민
윤하늘
오지훈
한지민</textarea>
        <p class="hint">쉼표, 줄바꿈, 탭으로 구분됩니다. 중복 이름은 자동 제거됩니다.</p>

        <div class="twocol">
          <div>
            <label>당첨 문구</label>
            <input id="winMsg" value="축하합니다! 당첨되었습니다." />
          </div>
          <div>
            <label>미당첨 문구</label>
            <input id="loseMsg" value="아쉽지만 이번 추첨에서는 미당첨입니다." />
          </div>
        </div>

        <div class="actions">
          <button class="btn primary" id="drawBtn">추첨 시작</button>
          <button class="btn ghost" id="resetBtn">초기화</button>
        </div>
      </div>

      <div class="card stage-card">
        <div class="stage-head">
          <div>
            <p class="eyebrow">LIVE DRAW</p>
            <h2 id="stageTitle">헥토헬스케어 이벤트 추첨</h2>
          </div>
          <div class="pill" id="countPill">참여자 0명</div>
        </div>
        <div class="chips" id="chips"></div>
        <div class="result-panel" id="adminResult">
          <span class="label-small">RESULT</span>
          <strong>대기 중</strong>
          <p>추첨을 시작하면 최종 당첨자가 표시됩니다.</p>
        </div>
      </div>
    </section>

    <section class="card link-card">
      <h2>참여자 결과 페이지 링크</h2>
      <p class="hint">추첨 후 생성된 링크를 메일 하이퍼링크로 배포하세요. 결과 페이지에서는 참여자 명단이 보이지 않습니다.</p>
      <div class="link-row">
        <input id="resultUrl" readonly placeholder="추첨 후 생성됩니다" />
        <button class="btn ghost" id="copyBtn">복사</button>
        <a class="btn ghost" id="openBtn" href="#" target="_blank" rel="noopener">열기</a>
      </div>
    </section>
  </main>

  <script src="./admin.js"></script>
</body>
</html>
