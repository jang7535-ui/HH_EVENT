<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>헥토헬스케어 이벤트 추첨 관리자</title><link rel="stylesheet" href="style.css"></head><body>
<div class="wrap">
  <header class="header"><div class="brand"><div class="logo"></div><div><h1>헥토헬스케어 이벤트 추첨</h1><p class="desc">관리자 페이지입니다. 참여자 등록 후 추첨을 실행하고 결과 링크/게시판용 발표 화면을 생성합니다.</p></div></div><span class="pill">ADMIN</span></header>
  <div id="login" class="card" style="max-width:520px;margin:60px auto"><h2>관리자 로그인</h2><label class="label">관리자 PIN</label><input id="pin" type="password" placeholder="PIN 입력" onkeydown="if(event.key==='Enter')login()"><button class="btn primary" style="margin-top:12px" onclick="login()">입장</button><p class="small">기본 PIN: hhc2026</p></div>
  <main id="app" class="hidden">
    <div class="grid">
      <section class="card">
        <h2>추첨 설정</h2>
        <label class="label">추첨 내용</label><input id="title" value="헥토헬스케어 이벤트 추첨">
        <label class="label">참여자 명단 <span class="small">쉼표 또는 줄바꿈 구분</span></label><textarea id="names">김민준
이서연
박지훈
최유진
정현우
강민지
조성민
윤하늘
오지훈
한지민</textarea>
        <div class="row"><div><label class="label">당첨 문구</label><input id="winMsg" value="축하합니다! 당첨되었습니다."></div><div><label class="label">미당첨 문구</label><input id="loseMsg" value="아쉽지만 이번에는 미당첨입니다."></div></div>
        <div class="row" style="margin-top:14px"><button class="btn primary" onclick="draw()">추첨 시작</button><button class="btn ghost" onclick="resetAll()">초기화</button></div>
        <div class="stack" style="margin-top:16px">
          <div><label class="label">참여자 결과 확인 링크</label><div class="copyline"><input id="resultUrl" readonly><button class="btn ghost" onclick="copy('resultUrl')">복사</button></div></div>
          <div><label class="label">게시판용 당첨자 발표 링크</label><div class="copyline"><input id="announceUrl" readonly><button class="btn ghost" onclick="copy('announceUrl')">복사</button></div><p class="small">게시판에 링크로 올리거나, 아래 버튼으로 발표 이미지를 저장해 첨부할 수 있습니다.</p></div>
          <div class="row"><button class="btn green" onclick="openAnnounce()">발표 화면 열기</button><button class="btn ghost" onclick="downloadPng()">결과 이미지 PNG 저장</button><button class="btn ghost" onclick="downloadWebm()">짧은 영상 WebM 저장</button></div>
        </div>
      </section>
      <section class="card">
        <div class="statusbar"><span class="pill" id="count">참여자 0명</span><span class="pill" id="winnerPill">당첨자 미선정</span></div>
        <div class="stage"><div class="titleLine"><div><div class="drawTitle" id="stageTitle">헥토헬스케어 이벤트 추첨</div><div class="drawSub">관리자 추첨 화면</div></div><span class="pill">LIVE DRAW</span></div><div id="chips" class="participants"></div><div id="result" class="resultBox"><div class="resultLabel">RESULT</div><div class="winnerName">대기 중</div><div class="message">추첨을 시작하면 당첨자가 표시됩니다.</div></div><div id="confetti" class="confetti"></div></div>
      </section>
    </div>
  </main><canvas id="recordCanvas" width="1280" height="720"></canvas><div class="footer">GitHub Pages 전용 · 데이터는 결과 링크에 포함됩니다.</div>
</div><script src="admin.js"></script></body></html>
